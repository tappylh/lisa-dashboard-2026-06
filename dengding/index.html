<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登顶视频号月度运营数据汇总</title>
  <style>
    :root { --bg:#f4efe6; --panel:#fffaf2; --ink:#211f1b; --muted:#817a70; --line:#e3dacd; --accent:#9b6b55; --shadow:0 18px 45px rgba(84,68,48,.10); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; color:var(--ink); background:radial-gradient(circle at 12% 0%, rgba(255,255,255,.78), transparent 30rem), linear-gradient(135deg,#f7f1e8 0%,#efe6d9 100%); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    main { width:min(1280px, calc(100% - 48px)); margin:0 auto; padding:64px 0; }
    .eyebrow { margin:0 0 18px; color:var(--muted); font-size:14px; font-weight:800; letter-spacing:4px; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(42px, 7vw, 88px); line-height:1.02; letter-spacing:0; }
    .copy { max-width:860px; margin:24px 0 42px; color:var(--muted); font-size:22px; line-height:1.65; font-weight:650; }
    .grid { display:grid; grid-template-columns:repeat(3, minmax(0,1fr)); gap:22px; }
    a.card { display:block; min-height:300px; padding:30px; color:inherit; text-decoration:none; background:rgba(255,250,242,.9); border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow); transition:transform .18s ease, box-shadow .18s ease; }
    a.card:hover { transform:translateY(-4px); box-shadow:0 22px 52px rgba(84,68,48,.16); }
    .month { color:var(--accent); font-size:20px; font-weight:850; }
    h2 { margin:26px 0 18px; font-size:clamp(34px, 4vw, 52px); line-height:1.05; letter-spacing:0; }
    .metrics { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; margin-top:28px; color:var(--muted); font-size:17px; font-weight:750; }
    .metrics strong { display:block; color:var(--ink); font-size:30px; line-height:1.15; }
    @media (max-width: 1080px) { .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media (max-width: 760px) { main { width:min(100% - 28px, 1280px); padding:38px 0; } .grid { grid-template-columns:1fr; } h1 { font-size:46px; } .copy { font-size:18px; } h2 { font-size:38px; } }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">WECHAT CHANNELS DATA COCKPIT</p>
    <h1>登顶视频号月度运营数据汇总</h1>
    <p class="copy">公开给同事查看的月度 dashboard 入口。每个月独立保存，避免四月、五月、六月互相覆盖。</p>
    <section class="grid" aria-label="月份入口">
      <a class="card" href="./2026-06/">
        <div class="month">2026 年 6 月</div>
        <h2>六月运营数据汇总</h2>
        <div class="metrics">
          <span><strong>1,775,131</strong>本月播放</span>
          <span><strong>13,116</strong>本月点赞</span>
          <span><strong>1,649</strong>净增关注</span>
          <span><strong>37</strong>发布作品</span>
        </div>
      </a>
      <a class="card" href="./2026-05/">
        <div class="month">2026 年 5 月</div>
        <h2>五月运营数据汇总</h2>
        <div class="metrics">
          <span><strong>1,396,610</strong>本月播放</span>
          <span><strong>10,073</strong>本月点赞</span>
          <span><strong>883</strong>净增关注</span>
          <span><strong>45</strong>发布作品</span>
        </div>
      </a>
      <a class="card" href="./2026-04/">
        <div class="month">2026 年 4 月</div>
        <h2>四月运营数据汇总</h2>
        <div class="metrics">
          <span><strong>446,889</strong>本月播放</span>
          <span><strong>4,592</strong>本月点赞</span>
          <span><strong>404</strong>净增关注</span>
          <span><strong>26</strong>发布作品</span>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
